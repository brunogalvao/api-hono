name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 */3 * *' # A cada 3 dias ao meio-dia UTC
  workflow_dispatch: # Permite rodar manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api-hono-pl5ue8a0z-bruno-galvos-projects.vercel.app/api/health)
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check falhou com status $STATUS"
            exit 1
          fi
          echo "Supabase ativo!"
