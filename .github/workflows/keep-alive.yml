name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 */3 * *' # A cada 3 dias ao meio-dia UTC
  workflow_dispatch: # Permite rodar manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Health
        run: |
          RESPONSE=$(curl -s https://api-hono-pl5ue8a0z-bruno-galvos-projects.vercel.app/api/health)
          echo "Response: $RESPONSE"
          echo "Ping enviado — Supabase mantido ativo!"
