name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 */3 * *' # A cada 3 dias ao meio-dia UTC
  workflow_dispatch: # Permite rodar manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Health
        run: |
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" https://api-hono-jet.vercel.app/api/health)
          RESPONSE=$(cat /tmp/response.json)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $RESPONSE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Supabase healthy — mantido ativo!"
          elif [ "$HTTP_CODE" = "503" ]; then
            echo "Supabase estava pausado, ping enviado para reativar."
          else
            echo "Resposta inesperada: $HTTP_CODE"
            exit 1
          fi
